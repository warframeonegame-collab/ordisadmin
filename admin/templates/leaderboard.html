{% extends 'base.html' %}

{% block title %}Таблица лидеров{% endblock %}

{% block content %}
<div class="page-header d-flex justify-content-between align-items-center">
    <div>
        <h1><i class="fas fa-trophy"></i> Таблица лидеров</h1>
        <p class="text-muted">Топ участников по уровню и опыту</p>
    </div>
    <button class="btn btn-outline-warning" onclick="loadLeaderboard()">
        <i class="fas fa-sync"></i> Обновить
    </button>
</div>

<!-- Статистика -->
<div class="row mb-4 g-3">
    <div class="col-md-4 col-6">
        <div class="stat-card text-center p-3">
            <div class="stat-icon" style="color: var(--gold);"><i class="fas fa-crown"></i></div>
            <div class="stat-number" id="stat-total">0</div>
            <div class="stat-label">Участников в топе</div>
        </div>
    </div>
    <div class="col-md-4 col-6">
        <div class="stat-card text-center p-3">
            <div class="stat-icon" style="color: var(--cyan);"><i class="fas fa-arrow-up"></i></div>
            <div class="stat-number" id="stat-avg-level">0</div>
            <div class="stat-label">Средний уровень</div>
        </div>
    </div>
    <div class="col-md-4 col-6">
        <div class="stat-card text-center p-3">
            <div class="stat-icon" style="color: var(--violet);"><i class="fas fa-star"></i></div>
            <div class="stat-number" id="stat-max-level">0</div>
            <div class="stat-label">Макс. уровень</div>
        </div>
    </div>
</div>

<!-- Таблица лидеров -->
<div class="card">
    <div class="card-body">
        <div id="leaderboard-container">
            <div class="text-center py-4">
                <div class="spinner-border text-warning" role="status">
                    <span class="visually-hidden">Загрузка...</span>
                </div>
                <p class="mt-2">Загрузка таблицы лидеров...</p>
            </div>
        </div>
    </div>
</div>

{% endblock %}

{% block scripts %}
<style>
.rank-1 {
  background: linear-gradient(135deg, rgba(240, 180, 41, 0.12), rgba(230, 126, 34, 0.08));
  border-left: 3px solid var(--gold);
  border-radius: var(--radius);
}
.rank-2 {
  background: linear-gradient(135deg, rgba(124, 77, 255, 0.12), rgba(142, 68, 173, 0.08));
  border-left: 3px solid var(--violet);
  border-radius: var(--radius);
}
.rank-3 {
  background: linear-gradient(135deg, rgba(0, 212, 255, 0.12), rgba(0, 150, 200, 0.08));
  border-left: 3px solid var(--cyan);
  border-radius: var(--radius);
}
.leaderboard-row {
  transition: all 0.2s;
  border-radius: var(--radius);
  margin-bottom: 2px;
}
.leaderboard-row:hover {
  background: rgba(0, 212, 255, 0.04) !important;
  transform: translateX(4px);
}
</style>
<script>
async function loadLeaderboard() {
    const container = document.getElementById('leaderboard-container');
    
    container.innerHTML = `<div class="text-center py-4"><div class="spinner-border text-warning" role="status"></div><p class="mt-2">Загрузка...</p></div>`;
    
    try {
        const resp = await fetch('/api/leaderboard');
        const users = await resp.json();
        
        if (!users || users.length === 0) {
            container.innerHTML = `<div class="text-center text-muted py-4"><i class="fas fa-users fa-3x mb-3"></i><h5>Нет данных</h5><p>Таблица лидеров пока пуста</p></div>`;
            return;
        }
        
        // Статистика
        const total = users.length;
        const avgLevel = Math.round(users.reduce((s, u) => s + (u.level || 1), 0) / total);
        const maxLevel = Math.max(...users.map(u => u.level || 1));
        document.getElementById('stat-total').textContent = total;
        document.getElementById('stat-avg-level').textContent = avgLevel;
        document.getElementById('stat-max-level').textContent = maxLevel;
        
        let html = '';
        
        for (let i = 0; i < users.length; i++) {
            const user = users[i];
            const rank = i + 1;
            
            let medal = '', rankClass = '';
            if (rank === 1) { medal = '🥇'; rankClass = 'rank-1'; }
            else if (rank === 2) { medal = '🥈'; rankClass = 'rank-2'; }
            else if (rank === 3) { medal = '🥉'; rankClass = 'rank-3'; }
            
            const level = user.level || 1;
            const xp = user.xp || 0;
            const position = user.position || '';
            const subdivision = user.subdivision || '';
            
            const xpForNextLevel = level * 100;
            const xpProgress = Math.min(100, (xp % xpForNextLevel) / Math.max(1, xpForNextLevel) * 100);
            
            html += `
                <div class="leaderboard-row d-flex align-items-center p-3 ${rankClass}" style="${!rankClass ? 'border-bottom: 1px solid var(--border-glass);' : ''}">
                    <div class="me-3 text-center" style="width: 40px; font-size: 1.1rem; font-weight: 700; color: var(--text-secondary);">
                        ${medal || rank}
                    </div>
                    <div class="flex-grow-1">
                        <div style="color: var(--text-primary); font-weight: 600;">${user.nickname || 'Неизвестно'}</div>
                        <div style="color: var(--text-muted); font-size: 0.75rem;"><code>${user.id}</code>${position ? ' · ' + position : ''}${subdivision ? ' · ' + subdivision : ''}</div>
                    </div>
                    <div class="text-end me-4" style="min-width: 80px;">
                        <div style="font-size: 1.3rem; font-weight: 700; color: var(--gold);">${level}</div>
                        <div style="color: var(--text-muted); font-size: 0.75rem;">уровень</div>
                    </div>
                    <div class="text-end" style="min-width: 100px;">
                        <div style="color: var(--cyan); font-weight: 600;">${xp.toLocaleString()}</div>
                        <div style="color: var(--text-muted); font-size: 0.75rem;">XP</div>
                    </div>
                </div>
                <div class="progress" style="height: 1px; background: var(--bg-glass); border-radius: 0;">
                    <div class="progress-bar" style="width: ${xpProgress}%; background: ${rank === 1 ? 'var(--gold)' : rank === 2 ? 'var(--violet)' : rank === 3 ? 'var(--cyan)' : 'var(--text-muted)'};"></div>
                </div>
            `;
        }
        
        container.innerHTML = html;
        
    } catch (e) {
        container.innerHTML = `<div class="text-center text-muted py-4"><i class="fas fa-exclamation-circle fa-3x mb-3"></i><h5>Ошибка загрузки</h5><p>${e.message}</p></div>`;
    }
}

loadLeaderboard();
</script>
{% endblock %}
