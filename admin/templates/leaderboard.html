{% extends 'base.html' %}

{% block title %}Таблица лидеров{% endblock %}

{% block content %}
<div class="page-header d-flex justify-content-between align-items-center">
    <div>
        <h1><i class="fas fa-trophy"></i> Таблица лидеров</h1>
        <p class="text-muted">Топ участников по уровню и опыту</p>
    </div>
    <button class="btn btn-outline-warning" onclick="loadLeaderboard()">
        <i class="fas fa-sync"></i> Обновить
    </button>
</div>

<!-- Таблица лидеров -->
<div class="card">
    <div class="card-body">
        <div id="leaderboard-container">
            <div class="text-center py-4">
                <div class="spinner-border text-warning" role="status">
                    <span class="visually-hidden">Загрузка...</span>
                </div>
                <p class="mt-2">Загрузка таблицы лидеров...</p>
            </div>
        </div>
    </div>
</div>

{% endblock %}

{% block scripts %}
<style>
.rank-1 { background: linear-gradient(135deg, rgba(241, 196, 15, 0.2), rgba(230, 126, 34, 0.15)); border-left: 4px solid #f1c40f; }
.rank-2 { background: linear-gradient(135deg, rgba(155, 89, 182, 0.2), rgba(142, 68, 173, 0.15)); border-left: 4px solid #9b59b6; }
.rank-3 { background: linear-gradient(135deg, rgba(233, 30, 99, 0.2), rgba(220, 20, 60, 0.15)); border-left: 4px solid #e91e63; }
.leaderboard-row { transition: all 0.3s ease; border-radius: 8px; margin-bottom: 2px; }
.leaderboard-row:hover { background: rgba(233, 30, 99, 0.1) !important; transform: translateX(5px); }
</style>
<script>
async function loadLeaderboard() {
    const container = document.getElementById('leaderboard-container');
    
    container.innerHTML = `
        <div class="text-center py-4">
            <div class="spinner-border text-warning" role="status"></div>
            <p class="mt-2">Загрузка...</p>
        </div>
    `;
    
    try {
        const resp = await fetch('/api/leaderboard');
        const users = await resp.json();
        
        if (!users || users.length === 0) {
            container.innerHTML = `
                <div class="text-center text-muted py-4">
                    <i class="fas fa-users fa-3x mb-3"></i>
                    <h5>Нет данных</h5>
                    <p>Таблица лидеров пока пуста</p>
                </div>
            `;
            return;
        }
        
        let html = '';
        
        for (let i = 0; i < users.length; i++) {
            const user = users[i];
            const rank = i + 1;
            
            // Медаль для топ-3
            let medal = '';
            let rankClass = '';
            if (rank === 1) { medal = '🥇'; rankClass = 'rank-1'; }
            else if (rank === 2) { medal = '🥈'; rankClass = 'rank-2'; }
            else if (rank === 3) { medal = '🥉'; rankClass = 'rank-3'; }
            
            const level = user.level || 1;
            const xp = user.xp || 0;
            const position = user.position || '';
            const subdivision = user.subdivision || '';
            
            // Прогресс-бар уровня
            const xpForNextLevel = level * 100;
            const xpProgress = Math.min(100, (xp % xpForNextLevel) / Math.max(1, xpForNextLevel) * 100);
            
            html += `
                <div class="leaderboard-row d-flex align-items-center p-3 ${rankClass}" style="${!rankClass ? 'border-bottom: 1px solid #3a3a3a;' : ''}">
                    <div class="me-3 text-center" style="width: 50px; font-size: 1.3rem; font-weight: 700; color: #b0b0b0;">
                        ${medal || rank}
                    </div>
                    <div class="flex-grow-1">
                        <div style="color: #fff; font-weight: 600;">${user.nickname || 'Неизвестно'}</div>
                        <div style="color: #888; font-size: 0.8rem;"><code>${user.id}</code>${position ? ' &middot; ' + position : ''}${subdivision ? ' &middot; ' + subdivision : ''}</div>
                    </div>
                    <div class="text-end me-4" style="min-width: 100px;">
                        <div style="font-size: 1.5rem; font-weight: 700; color: #f1c40f;">${level}</div>
                        <div style="color: #888; font-size: 0.8rem;">уровень</div>
                    </div>
                    <div class="text-end" style="min-width: 120px;">
                        <div style="color: #e91e63; font-weight: 600;">${xp.toLocaleString()}</div>
                        <div style="color: #888; font-size: 0.8rem;">XP</div>
                    </div>
                </div>
                <div class="progress" style="height: 2px; background: #1a1a1a; border-radius: 0;">
                    <div class="progress-bar" style="width: ${xpProgress}%; background: ${rank === 1 ? '#f1c40f' : rank === 2 ? '#9b59b6' : rank === 3 ? '#e91e63' : '#3a3a3a'};"></div>
                </div>
            `;
        }
        
        container.innerHTML = html;
        
    } catch (e) {
        console.error('Failed to load leaderboard:', e);
        container.innerHTML = `
            <div class="text-center text-muted py-4">
                <i class="fas fa-exclamation-circle fa-3x mb-3"></i>
                <h5>Ошибка загрузки</h5>
                <p>${e.message}</p>
            </div>
        `;
    }
}

loadLeaderboard();
</script>
{% endblock %}
