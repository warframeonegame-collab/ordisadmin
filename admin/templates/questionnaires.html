{% extends 'base.html' %}

{% block title %}Анкеты{% endblock %}

{% block content %}
<div class="page-header">
    <h1><i class="fas fa-clipboard-list"></i> Анкеты рекрутинга</h1>
    <p class="text-muted">Заполненные анкеты новичков клана</p>
</div>

<!-- Фильтр по дате -->
<div class="card mb-4">
    <div class="card-body">
        <div class="row g-3 align-items-end">
            <div class="col-md-3">
                <label class="form-label">Поиск по имени</label>
                <input type="text" class="form-control" id="q-search" placeholder="Имя...">
            </div>
            <div class="col-md-3 d-flex gap-2">
                <button class="btn btn-primary" onclick="loadQuestionnaires(1)">
                    <i class="fas fa-filter"></i> Загрузить
                </button>
                <button class="btn btn-outline-secondary" onclick="loadQuestionnaires(1)">
                    <i class="fas fa-sync"></i>
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Статистика -->
<div class="row mb-4 g-3">
    <div class="col-md-4 col-6">
        <div class="stat-card text-center p-3">
            <div class="stat-icon" style="color: var(--violet);"><i class="fas fa-file-alt"></i></div>
            <div class="stat-number" id="stat-total">0</div>
            <div class="stat-label">Всего анкет</div>
        </div>
    </div>
    <div class="col-md-4 col-6">
        <div class="stat-card text-center p-3">
            <div class="stat-icon" style="color: var(--cyan);"><i class="fas fa-users"></i></div>
            <div class="stat-number" id="stat-on-page">0</div>
            <div class="stat-label">На странице</div>
        </div>
    </div>
    <div class="col-md-4 col-6">
        <div class="stat-card text-center p-3">
            <div class="stat-icon" style="color: var(--gold);"><i class="fas fa-calendar-alt"></i></div>
            <div class="stat-number" id="stat-latest" style="font-size:0.9rem;">—</div>
            <div class="stat-label">Последняя анкета</div>
        </div>
    </div>
</div>

<!-- Список анкет -->
<div class="card">
    <div class="card-header">
        <h5 class="mb-0"><i class="fas fa-list"></i> Список анкет</h5>
    </div>
    <div class="card-body">
        <div id="q-container">
            <div class="text-center py-4">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Загрузка...</span>
                </div>
                <p class="mt-2">Загрузка анкет...</p>
            </div>
        </div>
    </div>
</div>

{% endblock %}

{% block scripts %}
<style>
.q-card-glass {
  background: var(--bg-card-glass);
  backdrop-filter: blur(16px);
  border: 1px solid var(--border-glass);
  border-radius: var(--radius-lg);
  margin-bottom: 16px;
  transition: all 0.25s;
  position: relative;
  overflow: hidden;
}
.q-card-glass::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--violet), var(--cyan));
  opacity: 0;
  transition: opacity 0.3s;
}
.q-card-glass:hover {
  transform: translateY(-3px);
  border-color: var(--border-glass-hover);
  box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
}
.q-card-glass:hover::before { opacity: 1; }
.q-card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 20px 12px;
  border-bottom: 1px solid var(--border-glass);
}
.q-card-body {
  padding: 16px 20px 20px;
}
.q-name {
  color: var(--cyan);
  font-weight: 700;
  font-size: 1rem;
}
.q-field {
  margin-bottom: 12px;
}
.q-field-label {
  color: var(--text-muted);
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  font-weight: 600;
}
.q-field-value {
  color: var(--text-primary);
  font-size: 0.88rem;
  margin-top: 3px;
  line-height: 1.5;
}
.q-date {
  color: var(--text-secondary);
  font-size: 0.75rem;
}
.q-pagination {
  display: flex;
  gap: 4px;
  justify-content: center;
  margin-top: 20px;
}
.q-pagination button {
  background: var(--bg-glass);
  border: 1px solid var(--border-glass);
  color: var(--text-secondary);
  padding: 6px 12px;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.2s;
  font-size: 0.82rem;
}
.q-pagination button:hover {
  background: var(--bg-glass-hover);
  border-color: var(--border-glass-hover);
  color: var(--text-primary);
}
.q-pagination button.active {
  background: rgba(0, 212, 255, 0.15);
  border-color: var(--cyan);
  color: var(--cyan);
}
.q-pagination button:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}
</style>
<script>
let currentPage = 1;

async function loadQuestionnaires(page) {
    currentPage = page || 1;
    const container = document.getElementById('q-container');
    const search = document.getElementById('q-search').value.toLowerCase();
    
    container.innerHTML = `
        <div class="text-center py-4">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-2">Загрузка...</p>
        </div>
    `;
    
    try {
        const resp = await fetch(`/api/questionnaires?page=${currentPage}`);
        const data = await resp.json();
        
        let qList = Array.isArray(data.questionnaires) ? data.questionnaires : [];
        const total = data.total || 0;
        const totalPages = data.total_pages || 1;
        const page = data.page || 1;
        
        // Фильтр по имени (клиентский)
        if (search) {
            qList = qList.filter(q => 
                (q.name || '').toLowerCase().includes(search) ||
                (q.nickname || '').toLowerCase().includes(search)
            );
        }
        
        // Статистика
        document.getElementById('stat-total').textContent = total;
        document.getElementById('stat-on-page').textContent = qList.length;
        if (qList.length > 0) {
            const lastDate = qList[0].filled_at || '—';
            document.getElementById('stat-latest').textContent = lastDate.substring(0, 10);
        }
        
        if (qList.length === 0) {
            container.innerHTML = `
                <div class="text-center text-muted py-5">
                    <i class="fas fa-clipboard fa-3x mb-3" style="opacity:0.3;"></i>
                    <p>Анкет пока нет</p>
                </div>
            `;
            return;
        }
        
        let html = `<div class="mb-3 text-muted small"><i class="fas fa-database me-1"></i>Всего анкет: <strong>${total}</strong> · Страница ${page} из ${totalPages}</div>`;
        
        for (const q of qList) {
            html += `
                <div class="q-card-glass">
                    <div class="q-card-header">
                        <div>
                            <span class="q-name"><i class="fas fa-user-circle me-1"></i>${escapeHtml(q.name || 'Не указано')}</span>
                            <span class="text-muted ms-2" style="font-size:0.82rem;">(${escapeHtml(q.nickname || q.username || '')})</span>
                        </div>
                        <span class="q-date"><i class="far fa-clock me-1"></i>${q.filled_at || 'N/A'}</span>
                    </div>
                    <div class="q-card-body">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="q-field">
                                    <div class="q-field-label"><i class="fas fa-birthday-cake me-1" style="color:var(--rose);"></i>Возраст</div>
                                    <div class="q-field-value">${escapeHtml(q.age || 'Не указано')}</div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="q-field">
                                    <div class="q-field-label"><i class="fas fa-sitemap me-1" style="color:var(--gold);"></i>Интерес к подразделениям</div>
                                    <div class="q-field-value">${escapeHtml(q.subdivision_interest || 'Не указано')}</div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="q-field">
                                    <div class="q-field-label"><i class="fas fa-eye me-1" style="color:var(--cyan);"></i>Ожидания от клана</div>
                                    <div class="q-field-value">${escapeHtml(q.expectations || 'Не указано')}</div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="q-field">
                                    <div class="q-field-label"><i class="fas fa-hand-peace me-1" style="color:var(--green);"></i>Что может дать клану</div>
                                    <div class="q-field-value">${escapeHtml(q.contribution || 'Не указано')}</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }
        
        // Пагинация
        if (totalPages > 1) {
            html += '<div class="q-pagination">';
            html += `<button ${page <= 1 ? 'disabled' : ''} onclick="loadQuestionnaires(${page - 1})"><i class="fas fa-chevron-left"></i></button>`;
            
            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= page - 2 && i <= page + 2)) {
                    html += `<button class="${i === page ? 'active' : ''}" onclick="loadQuestionnaires(${i})">${i}</button>`;
                } else if (i === page - 3 || i === page + 3) {
                    html += `<button disabled>...</button>`;
                }
            }
            
            html += `<button ${page >= totalPages ? 'disabled' : ''} onclick="loadQuestionnaires(${page + 1})"><i class="fas fa-chevron-right"></i></button>`;
            html += '</div>';
        }
        
        container.innerHTML = html;
        
    } catch (e) {
        container.innerHTML = `
            <div class="text-center text-muted py-4">
                <i class="fas fa-exclamation-circle fa-3x mb-3"></i>
                <h5>Ошибка загрузки</h5>
                <p>${e.message}</p>
            </div>
        `;
    }
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text || '';
    return div.innerHTML;
}

loadQuestionnaires(1);
</script>
{% endblock %}
