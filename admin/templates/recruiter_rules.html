{% extends 'base.html' %}

{% block title %}Правила для рекрутеров{% endblock %}

{% block content %}
<div class="page-header">
    <h1><i class="fas fa-user-plus"></i> Правила для рекрутеров</h1>
</div>

<div class="card">
    <div class="card-body">
        <div id="recruiter-rules-container">
            <div class="text-center py-4">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Загрузка...</span>
                </div>
                <p class="mt-2">Загрузка правил...</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<style>
.rules-content {
    color: #e0e0e0;
    line-height: 1.8;
    font-size: 1rem;
    text-align: justify;
}
.rules-content h1 {
    color: #e91e63;
    margin-top: 1.5rem;
    margin-bottom: 0.8rem;
    text-align: center;
}
.rules-content h1:first-child {
    font-size: 1.8rem;
}
.rules-content h2, .rules-content h3, .rules-content h4 {
    color: #e91e63;
    margin-top: 1.5rem;
    margin-bottom: 0.8rem;
}
.rules-content p {
    margin-bottom: 0.8rem;
    text-align: justify;
}
.rules-content ul, .rules-content ol {
    margin-bottom: 1rem;
    padding-left: 1.5rem;
}
.rules-content li {
    margin-bottom: 0.4rem;
}
.rules-content a {
    color: #e91e63;
    text-decoration: underline;
}
.rules-content table {
    width: auto;
    border-collapse: collapse;
    margin: 0 auto 1rem auto;
}
.rules-content th, .rules-content td {
    border: 1px solid #3a3a3a;
    padding: 8px 12px;
    text-align: left;
}
.rules-content th {
    background: #2a2a2a;
    color: #e91e63;
}
.rules-content td {
    background: #1a1a1a;
}
.rules-content img {
    max-width: 100%;
    border-radius: 8px;
    margin: 8px 0;
}
.rules-content blockquote {
    border-left: 4px solid #e91e63;
    padding-left: 1rem;
    margin: 1rem 0;
    color: #aaa;
    font-style: italic;
}
.rules-content hr {
    border-color: #3a3a3a;
    margin: 1.5rem 0;
}
.rules-content strong {
    color: #fff;
}
.rules-content em {
    color: #ccc;
}
.rules-iframe {
    width: 100%;
    height: 80vh;
    border: none;
    border-radius: 8px;
    background: #fff;
}

/* Кнопка возврата к основным правилам */
.back-btn-wrapper {
    text-align: center;
    margin-top: 2rem;
    padding: 1.5rem;
    border-top: 1px solid #3a3a3a;
}
.back-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.75rem 2rem;
    background: transparent;
    color: var(--accent-pink);
    text-decoration: none;
    border-radius: 8px;
    font-weight: 600;
    transition: all 0.3s ease;
    border: 1px solid var(--accent-pink);
    cursor: pointer;
    font-size: 1rem;
}
.back-btn:hover {
    background: rgba(233, 30, 99, 0.15);
    color: var(--accent-pink);
}
</style>
<script>
async function loadRecruiterRules() {
    const container = document.getElementById('recruiter-rules-container');
    const docId = '1-tbBVPKZZRZQduyspKD8gbH0al3Mr20Wul27NNOkgio';
    const exportUrl = 'https://docs.google.com/document/d/' + docId + '/export?format=html';
    
    try {
        const resp = await fetch(exportUrl);
        if (!resp.ok) throw new Error('Failed to fetch');
        const html = await resp.text();
        
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');
        const body = doc.body;
        
        if (body && body.innerHTML.trim()) {
            container.innerHTML = '<div class="rules-content">' + body.innerHTML + '</div>';
            
            // Скрываем всё, КРОМЕ секций с рекрутерами
            const headings = container.querySelectorAll('h1, h2, h3, h4, h5');
            let insideRecruiterSection = false;
            let recruiterSectionContent = [];
            
            headings.forEach(h => {
                const text = h.textContent.toLowerCase();
                const tagLevel = parseInt(h.tagName.substring(1));
                
                if (text.includes('рекрутер') || text.includes('рекрутинг')) {
                    insideRecruiterSection = true;
                    // Показываем этот заголовок
                    h.style.display = '';
                    recruiterSectionContent.push(h);
                    
                    // Собираем все элементы до следующего заголовка того же уровня
                    let el = h.nextElementSibling;
                    while (el) {
                        if (el.tagName && el.tagName.match(/^H[1-5]$/)) {
                            const nextLevel = parseInt(el.tagName.substring(1));
                            if (nextLevel <= tagLevel) break;
                        }
                        el.style.display = '';
                        recruiterSectionContent.push(el);
                        el = el.nextElementSibling;
                    }
                } else if (!insideRecruiterSection) {
                    // Скрываем всё до найденной секции рекрутеров
                    h.style.display = 'none';
                    let el = h.nextElementSibling;
                    while (el) {
                        if (el.tagName && el.tagName.match(/^H[1-5]$/)) {
                            const nextLevel = parseInt(el.tagName.substring(1));
                            if (nextLevel <= tagLevel) break;
                        }
                        el.style.display = 'none';
                        el = el.nextElementSibling;
                    }
                } else {
                    // После секции рекрутеров — скрываем всё остальное
                    h.style.display = 'none';
                    let el = h.nextElementSibling;
                    while (el) {
                        if (el.tagName && el.tagName.match(/^H[1-5]$/)) {
                            const nextLevel = parseInt(el.tagName.substring(1));
                            if (nextLevel <= tagLevel) break;
                        }
                        el.style.display = 'none';
                        el = el.nextElementSibling;
                    }
                }
            });
            
            // Добавляем кнопку возврата
            const btnWrapper = document.createElement('div');
            btnWrapper.className = 'back-btn-wrapper';
            btnWrapper.innerHTML = `
                <a href="/rules" class="back-btn">
                    <i class="fas fa-arrow-left"></i> Вернуться к основным правилам
                </a>
            `;
            container.querySelector('.rules-content').appendChild(btnWrapper);
        } else {
            throw new Error('Empty content');
        }
    } catch (e) {
        console.error('Failed to load recruiter rules:', e);
        container.innerHTML = '<iframe class="rules-iframe" src="https://docs.google.com/document/d/' + docId + '/preview"></iframe>';
    }
}

loadRecruiterRules();
</script>
{% endblock %}
