{% extends 'base.html' %}

{% block login_content %}
<div class="login-container">
    <div class="login-card">
        <div class="logo-container">
            <img src="{{ url_for('static', filename='img/logo.png') }}" alt="AP" class="login-logo">
        </div>
        <h1 class="login-title">Arasaka Plaza</h1>
        <p class="login-subtitle">Admin Panel для Warframe клана</p>
        
        <a href="{{ discord_auth_url }}" class="discord-btn">
            <i class="fab fa-discord"></i>
            Войти через Discord
        </a>
        
        <div class="login-features">
            <div class="feature">
                <i class="fas fa-shield-alt"></i>
                <span>Безопасный вход</span>
            </div>
            <div class="feature">
                <i class="fas fa-users-cog"></i>
                <span>Управление участниками</span>
            </div>
            <div class="feature">
                <i class="fas fa-chart-line"></i>
                <span>Статистика клана</span>
            </div>
        </div>
    </div>
</div>
{% endblock %}
