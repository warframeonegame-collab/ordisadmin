{% extends "base.html" %}
{% block title %}Сессии{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="mb-0"><i class="fas fa-desktop me-2"></i>Активные сессии</h4>
    <button class="btn btn-sm btn-outline-secondary" onclick="loadSessions()">
        <i class="fas fa-sync-alt me-1"></i>Обновить
    </button>
</div>

<div id="sessionsContainer">
    <div class="text-center py-5">
        <div class="spinner-border text-primary" role="status"></div>
        <p class="text-muted mt-2">Загрузка...</p>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function loadSessions() {
    fetch('/api/sessions')
        .then(r => r.json())
        .then(data => renderSessions(data.sessions || []))
        .catch(err => {
            document.getElementById('sessionsContainer').innerHTML = 
                '<div class="alert alert-danger">Ошибка: ' + err.message + '</div>';
        });
}

function renderSessions(sessions) {
    const container = document.getElementById('sessionsContainer');
    if (sessions.length === 0) {
        container.innerHTML = `
            <div class="text-center py-5">
                <i class="fas fa-desktop fa-3x text-muted mb-3"></i>
                <p class="text-muted">Нет активных сессий</p>
            </div>`;
        return;
    }
    
    let html = '<div class="row">';
    for (const s of sessions) {
        const loginTime = s.login_time ? new Date(s.login_time).toLocaleString('ru-RU') : 'Н/Д';
        const lastActive = s.last_active ? new Date(s.last_active).toLocaleString('ru-RU') : 'Н/Д';
        const isOnline = s.last_active && (Date.now() - new Date(s.last_active).getTime()) < 300000;
        
        html += `
        <div class="col-md-6 col-lg-4 mb-3">
            <div class="card bg-dark border-secondary">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <div>
                            <h6 class="mb-0">${escapeHtml(s.username || 'Unknown')}</h6>
                            <small class="text-muted">${s.user_id}</small>
                        </div>
                        <span class="badge ${isOnline ? 'bg-success' : 'bg-secondary'}">
                            ${isOnline ? '● Онлайн' : '○ Оффлайн'}
                        </span>
                    </div>
                    <div class="mb-2" style="font-size:0.8rem;">
                        <div><i class="fas fa-sign-in-alt me-1 text-success"></i>Вход: ${loginTime}</div>
                        <div><i class="fas fa-clock me-1 text-info"></i>Активность: ${lastActive}</div>
                    </div>
                    <button class="btn btn-sm btn-outline-danger" onclick="terminateSession('${s.user_id}', '${escapeHtml(s.username)}')">
                        <i class="fas fa-times me-1"></i>Завершить
                    </button>
                </div>
            </div>
        </div>`;
    }
    html += '</div>';
    container.innerHTML = html;
}

function terminateSession(userId, username) {
    if (!confirm(`Завершить сессию ${username}?`)) return;
    fetch('/api/sessions/terminate', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({user_id: userId})
    })
    .then(r => r.json())
    .then(data => {
        if (data.success) {
            showToast('Сессия завершена', 'success');
            loadSessions();
        } else {
            showToast(data.error || 'Ошибка', 'danger');
        }
    });
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text || '';
    return div.innerHTML;
}

loadSessions();
</script>
{% endblock %}
